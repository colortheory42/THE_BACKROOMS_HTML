<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE POOL</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; }
  body { background:#000; display:flex; justify-content:center; align-items:center; font-family:'Courier New',monospace; }
  canvas { display:block; cursor:none; touch-action:none; }
  #overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.92);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    color:#5bd6f5; z-index:10;
  }
  #overlay h1 { font-size:clamp(1.4rem,6vw,3rem); letter-spacing:0.4em; margin-bottom:1rem; text-shadow:0 0 40px #5bd6f566; }
  #overlay p  { color:#aaa; margin:0.3rem 0; font-size:clamp(0.65rem,2vw,0.85rem); }
  #overlay .hint { color:#5bd6f5; margin-top:1.5rem; font-size:clamp(0.85rem,2.5vw,1rem); animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #menu-btn {
    position:fixed; top:1rem; left:1rem; z-index:50;
    font-family:'Courier New',monospace; font-size:0.65rem; letter-spacing:0.25em;
    color:rgba(91,214,245,0.5); background:transparent;
    border:1px solid rgba(91,214,245,0.25); padding:0.35rem 0.7rem; cursor:pointer;
    transition:color 0.2s,border-color 0.2s,background 0.2s,opacity 0.2s;
    text-decoration:none; display:block; opacity:0; pointer-events:none;
  }
  #menu-btn.visible { opacity:1; pointer-events:all; }
  #menu-btn:hover { color:#5bd6f5; border-color:rgba(91,214,245,0.7); background:rgba(91,214,245,0.07); }
  #fade-out { position:fixed; inset:0; z-index:99; background:#000; opacity:0; pointer-events:none; transition:opacity 0.4s ease-in; }
  #fade-out.go { opacity:1; pointer-events:all; }
  #underwater-vignette {
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,80,140,0.0) 100%);
    opacity:0; transition:opacity 0.5s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="underwater-vignette"></div>
<div id="fade-out"></div>
<a id="menu-btn" href="index.html" onclick="var f=document.getElementById('fade-out');f.classList.add('go');setTimeout(function(){window.location.href='index.html';},420);return false;">MENU</a>
<div id="overlay">
  <h1>THE POOL</h1>
  <p>One room. One pool. Infinite in depth.</p>
  <p style="color:#666;font-size:0.75rem;margin-top:0.5rem;">WASD · Mouse · Shift to run · Space to jump · C to dive</p>
  <div class="hint" id="overlay-hint">CLICK TO ENTER</div>
</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const CFG = {
  NEAR:1, FOV_DEG:90, WALK_SPEED:160, RUN_SPEED:340, MOUSE_SENS:0.0018,
  HEAD_BOB_SPEED:3.0, HEAD_BOB_AMT:4, HEAD_BOB_SWAY:1.5,
  CAMERA_H:50, CROUCH_H:24, JUMP_VEL:280, GRAVITY:700, CROUCH_SPEED:0.6,
  RENDER_DIST:14000,
  // Swimming / buoyancy
  SWIM_SPEED:110,          // horizontal speed in water
  SWIM_UP_VEL:200,         // upward kick from space bar
  SWIM_DOWN_VEL:180,       // dive speed (hold C/Ctrl)
  BUOYANCY:520,            // upward force when fully submerged
  WATER_DRAG:4.5,          // velocity damping in water
  SURFACE_FLOAT_Y:-10,     // camera Y where player bobs at surface (just below water line)
  // Room dims
  ROOM_W:1800, ROOM_D:2400, ROOM_H:380,
  // Pool
  POOL_X1:-400, POOL_X2:400, POOL_Z1:-700, POOL_Z2:700,
  POOL_DEPTH:80, // how far below floor level the water surface sits (visual lip)
  // Colors
  FLOOR_COL:[30,18,120],   // blue carpet
  FLOOR_COL2:[26,14,110],
  CEIL_COL:[220,200,60],   // yellowish ceiling
  WALL_COL:[230,210,50],   // yellow walls
  WALL_EDGE:[255,235,80],
  BASEBOARD:[180,160,30],
  CROWN:[200,180,40],
  WATER_COL:[100,195,240], // light blue water surface
  WATER_COL2:[80,175,220],
  WATER_DEEP:[40,120,180], // seen through depth
  POOL_WALL:[70,160,210],  // underwater tile walls
  POOL_FLOOR:[50,130,185],
  BG_COL:[10,12,18],
};

const RW=CFG.ROOM_W/2, RD=CFG.ROOM_D/2, CH=CFG.ROOM_H;
const BH=14, CrH=16;
// Pool bounds
const PX1=CFG.POOL_X1, PX2=CFG.POOL_X2, PZ1=CFG.POOL_Z1, PZ2=CFG.POOL_Z2;
const WATER_Y = 0; // water surface at floor level
const P_RAD = 30;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function rgb(r,g,b){ return `rgb(${r|0},${g|0},${b|0})`; }

// ── PLAYER ────────────────────────────────────────────────────────────────
const player = {
  wx:0, wy:CFG.CAMERA_H+2, wz:RD-200,
  wxs:0, wys:CFG.CAMERA_H+2, wzs:RD-200,
  yaw:Math.PI, pitch:0, yaws:Math.PI, pitchs:0,
  bobTime:0, shakeTime:Math.random()*100,
  isMoving:false, isRunning:false, isJumping:false, isCrouching:false,
  jumpsUsed:0, velY:0, landThud:false,
  isSwimming:false, isUnderwater:false,
  underwaterTime:0, bubbleTime:0,
};

const isTouchDevice = ('ontouchstart' in window)||(navigator.maxTouchPoints>0);
let isMobile = isTouchDevice;
const keys = {};
let mouseLocked=false, mouseDX=0, mouseDY=0;
document.addEventListener('keydown', e=>{ keys[e.code]=true; });
document.addEventListener('keyup',   e=>{ keys[e.code]=false; });

const joy={active:false,id:-1,baseX:0,baseY:0,dx:0,dy:0};
const lookT={active:false,id:-1,lastX:0,lastY:0};
let touchLookDX=0,touchLookDY=0;

function setupMobileControls(){
  if(!isMobile)return;
  document.getElementById('overlay-hint').textContent='TAP TO ENTER';
  const JR=52;
  document.addEventListener('touchstart',e=>{
    e.preventDefault(); initAudio();
    if(!mouseLocked){enterMobile();return;}
    for(const t of e.changedTouches){
      if(t.clientX/window.innerWidth<0.45){
        if(joy.active)continue;
        joy.active=true;joy.id=t.identifier;joy.baseX=t.clientX;joy.baseY=t.clientY;joy.dx=0;joy.dy=0;
      }else{
        if(lookT.active)continue;
        lookT.active=true;lookT.id=t.identifier;lookT.lastX=t.clientX;lookT.lastY=t.clientY;
      }
    }
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){
        let dx=t.clientX-joy.baseX,dy=t.clientY-joy.baseY;
        const mag=Math.sqrt(dx*dx+dy*dy);
        if(mag>JR){dx=dx/mag*JR;dy=dy/mag*JR;}
        joy.dx=dx;joy.dy=dy;
      }
      if(t.identifier===lookT.id){
        touchLookDX+=(t.clientX-lookT.lastX);touchLookDY+=(t.clientY-lookT.lastY);
        lookT.lastX=t.clientX;lookT.lastY=t.clientY;
      }
    }
  },{passive:false});
  const endFn=e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){joy.active=false;joy.id=-1;joy.dx=0;joy.dy=0;keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false;}
      if(t.identifier===lookT.id){lookT.active=false;lookT.id=-1;}
    }
  };
  document.addEventListener('touchend',endFn,{passive:false});
  document.addEventListener('touchcancel',endFn,{passive:false});
}
function applyJoystickToKeys(){
  if(!isMobile)return;
  if(!joy.active||(joy.dx===0&&joy.dy===0)){keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false;return;}
  const mag=Math.sqrt(joy.dx*joy.dx+joy.dy*joy.dy);
  if(mag<10){keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false;return;}
  const nx=joy.dx/mag,ny=joy.dy/mag;
  keys['KeyW']=ny<-0.25;keys['KeyS']=ny>0.25;keys['KeyD']=nx>0.25;keys['KeyA']=nx<-0.25;
}
function enterMobile(){ initAudio();mouseLocked=true;document.getElementById('overlay').style.display='none';document.getElementById('menu-btn').classList.remove('visible'); }
function enterDesktop(){ initAudio();canvas.requestPointerLock(); }
document.addEventListener('mousemove',e=>{ if(!mouseLocked)return;mouseDX+=e.movementX;mouseDY+=e.movementY; });
let zoomFOV=CFG.FOV_DEG, zoomTarget=CFG.FOV_DEG;
const ZOOM_MIN=8, ZOOM_MAX=100, ZOOM_STEP=6;
document.addEventListener('wheel',e=>{ if(!mouseLocked)return;zoomTarget=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomTarget+Math.sign(e.deltaY)*ZOOM_STEP)); },{passive:true});
document.getElementById('overlay').addEventListener('click',()=>{ if(isMobile)enterMobile();else enterDesktop(); });
document.getElementById('overlay').addEventListener('touchstart',e=>{ e.preventDefault();enterMobile(); },{passive:false});
canvas.addEventListener('click',()=>{ if(!isMobile&&!mouseLocked)enterDesktop(); });
document.addEventListener('pointerlockchange',()=>{
  if(isMobile)return;
  mouseLocked = document.pointerLockElement===canvas;
  if(mouseLocked&&audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  document.getElementById('overlay').style.display = mouseLocked?'none':'flex';
  document.getElementById('menu-btn').classList.toggle('visible',!mouseLocked);
});

// ── CAMERA MATH ───────────────────────────────────────────────────────────
function worldToCamera(wx,wy,wz){
  let x=wx-player.wxs, y=wy-player.wys, z=wz-player.wzs;
  const yaw=-player.yaws;
  const x1= x*Math.cos(yaw)+z*Math.sin(yaw);
  const z1=-x*Math.sin(yaw)+z*Math.cos(yaw);
  const cp=Math.cos(player.pitchs), sp=Math.sin(player.pitchs);
  return [x1, y*cp-z1*sp, y*sp+z1*cp];
}
function project(cx,cy,cz){
  if(cz<=CFG.NEAR)return null;
  const aspect=H/W, focal=(W*0.5)/Math.tan((zoomFOV*0.5)*Math.PI/180);
  const s=focal/cz;
  const sx=W*0.5+cx*s, sy=H*0.5-cy*s*aspect;
  return (isFinite(sx)&&isFinite(sy))?[sx,sy]:null;
}
function clipNear(poly){
  if(!poly||poly.length<3)return[];
  const N=CFG.NEAR, ins=p=>p[2]>=N;
  const ix=(a,b)=>{ const dz=b[2]-a[2];if(Math.abs(dz)<1e-7)return null;const t=(N-a[2])/dz;return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,N+0.001]; };
  const out=[];let prev=poly[poly.length-1],pi=ins(prev);
  for(const cur of poly){
    const ci=ins(cur);
    if(ci&&pi)out.push(cur);
    else if(ci&&!pi){const i=ix(prev,cur);if(i)out.push(i);out.push(cur);}
    else if(!ci&&pi){const i=ix(prev,cur);if(i)out.push(i);}
    prev=cur;pi=ci;
  }
  return out.length>=3?out:[];
}
function fog(r,g,b,d){
  if(d<400)return[r,g,b];
  const t=Math.min(1,(d-400)/(CFG.RENDER_DIST-400));
  const[fr,fg,fb]=CFG.BG_COL;
  return[(r+(fr-r)*t)|0,(g+(fg-g)*t)|0,(b+(fb-b)*t)|0];
}

// ── PAINTER'S QUEUE ───────────────────────────────────────────────────────
const _pq=[];
function poly(pts,color,edgeColor){
  let ax=0,ay=0,az=0;
  for(const[x,y,z] of pts){ax+=x;ay+=y;az+=z;}
  const n=pts.length;ax/=n;ay/=n;az/=n;
  const dx=ax-player.wxs,dy=ay-player.wys,dz=az-player.wzs;
  _pq.push({d:dx*dx+dy*dy+dz*dz, pts, color, edgeColor});
}
function flush(){
  _pq.sort((a,b)=>b.d-a.d);
  for(const{pts,color,edgeColor} of _pq){
    const cam=pts.map(([x,y,z])=>worldToCamera(x,y,z));
    if(cam.every(p=>p[2]<CFG.NEAR))continue;
    let ax=0,ay=0,az=0;for(const p of cam){ax+=p[0];ay+=p[1];az+=p[2];}ax/=cam.length;ay/=cam.length;az/=cam.length;
    const dist=Math.sqrt(ax*ax+az*az);
    if(dist>CFG.RENDER_DIST*1.5)continue;
    let[r,g,b]=color;[r,g,b]=fog(r,g,b,dist);
    const cl=clipNear(cam);if(cl.length<3)continue;
    const sc=cl.map(([cx,cy,cz])=>project(cx,cy,cz));if(sc.some(p=>!p))continue;
    const mnX=Math.min(...sc.map(p=>p[0])),mxX=Math.max(...sc.map(p=>p[0]));
    const mnY=Math.min(...sc.map(p=>p[1])),mxY=Math.max(...sc.map(p=>p[1]));
    if(mxX<-200||mnX>W+200||mxY<-200||mnY>H+200)continue;
    if((mxX-mnX)<0.4&&(mxY-mnY)<0.4)continue;
    ctx.beginPath();ctx.moveTo(sc[0][0],sc[0][1]);
    for(let i=1;i<sc.length;i++)ctx.lineTo(sc[i][0],sc[i][1]);
    ctx.closePath();ctx.fillStyle=rgb(r,g,b);ctx.fill();
    if(edgeColor){
      let[er,eg,eb]=edgeColor;[er,eg,eb]=fog(er,eg,eb,dist);
      ctx.strokeStyle=rgb(er,eg,eb);ctx.lineWidth=1.2;ctx.stroke();
    }
  }
  _pq.length=0;
}

// ── WATER ANIMATION ───────────────────────────────────────────────────────
let waterTime=0;
// Returns a slightly animated water color with ripple
function waterColor(t){
  const wave=Math.sin(t*1.4)*8+Math.cos(t*0.9)*5;
  return[CFG.WATER_COL[0]+wave,CFG.WATER_COL[1]+wave,CFG.WATER_COL[2]+wave];
}
// Water shimmer lines drawn as screen-space overlay
function drawWaterShimmer(t){
  if(!mouseLocked)return;
  // Project the pool corners to screen and find bounding box
  const corners=[
    [PX1,WATER_Y,PZ1],[PX2,WATER_Y,PZ1],
    [PX2,WATER_Y,PZ2],[PX1,WATER_Y,PZ2]
  ];
  const sc=[];
  for(const[x,y,z] of corners){
    const c=worldToCamera(x,y,z);
    if(c[2]<=CFG.NEAR)return; // bail if camera is over pool weirdly
    const p=project(c[0],c[1],c[2]);
    if(!p)return;
    sc.push(p);
  }
  // bounding box
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const[px,py] of sc){ minX=Math.min(minX,px);maxX=Math.max(maxX,px);minY=Math.min(minY,py);maxY=Math.max(maxY,py); }
  if(maxX<0||minX>W||maxY<0||minY>H)return;
  minX=Math.max(0,minX); maxX=Math.min(W,maxX);
  minY=Math.max(0,minY); maxY=Math.min(H,maxY);
  if(maxX-minX<4||maxY-minY<4)return;

  ctx.save();
  ctx.globalAlpha=0.13;
  // Draw ~12 animated wavy shimmer lines
  const nLines=12;
  for(let i=0;i<nLines;i++){
    const frac=(i/nLines);
    const baseY=minY+(maxY-minY)*frac;
    const phase=t*1.8+i*0.7;
    ctx.beginPath();
    let first=true;
    for(let px=minX;px<=maxX;px+=8){
      const py=baseY+Math.sin(phase+(px-minX)*0.018)*4+Math.cos(phase*0.7+(px-minX)*0.009)*2;
      if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
    }
    ctx.strokeStyle='rgba(200,240,255,1)';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  ctx.restore();
}

// ── GEOMETRY ──────────────────────────────────────────────────────────────
// Room: -RW..+RW on X, -RD..+RD on Z, 0..CH on Y
// Pool: PX1..PX2 on X, PZ1..PZ2 on Z, centered in room, water surface at Y=0

function emitRoom(t){
  const WC=CFG.WALL_COL, WE=CFG.WALL_EDGE, BS=CFG.BASEBOARD, CR=CFG.CROWN;
  const CC=CFG.CEIL_COL;

  // ── CEILING ──
  poly([[-RW,CH,-RD],[RW,CH,-RD],[RW,CH,RD],[-RW,CH,RD]], CC, null);
  // Ceiling light strip down center
  poly([[-30,CH-1,-RD],[30,CH-1,-RD],[30,CH-1,RD],[-30,CH-1,RD]], [245,235,140], null);

  // ── FLOOR (carpet — tiles around the pool) ──
  // We tile the floor in 4 strips around the pool
  const FC=CFG.FLOOR_COL, FC2=CFG.FLOOR_COL2;
  // North strip (z: PZ2..RD)
  poly([[-RW,0,PZ2],[RW,0,PZ2],[RW,0,RD],[-RW,0,RD]], FC, null);
  // South strip (z: -RD..PZ1)
  poly([[-RW,0,-RD],[RW,0,-RD],[RW,0,PZ1],[-RW,0,PZ1]], FC2, null);
  // West strip (z: PZ1..PZ2, x: -RW..PX1)
  poly([[-RW,0,PZ1],[PX1,0,PZ1],[PX1,0,PZ2],[-RW,0,PZ2]], FC, null);
  // East strip (z: PZ1..PZ2, x: PX2..RW)
  poly([[PX2,0,PZ1],[RW,0,PZ1],[RW,0,PZ2],[PX2,0,PZ2]], FC2, null);
  // Thin pool rim tiles (lip around pool edge) — slightly lighter blue
  const RIM=18, RIMC=[45,28,145];
  poly([[PX1,0,PZ1],[PX2,0,PZ1],[PX2,0,PZ1+RIM],[PX1,0,PZ1+RIM]], RIMC, null);
  poly([[PX1,0,PZ2-RIM],[PX2,0,PZ2-RIM],[PX2,0,PZ2],[PX1,0,PZ2]], RIMC, null);
  poly([[PX1,0,PZ1+RIM],[PX1+RIM,0,PZ1+RIM],[PX1+RIM,0,PZ2-RIM],[PX1,0,PZ2-RIM]], RIMC, null);
  poly([[PX2-RIM,0,PZ1+RIM],[PX2,0,PZ1+RIM],[PX2,0,PZ2-RIM],[PX2-RIM,0,PZ2-RIM]], RIMC, null);

  // ── WALLS ──
  // South wall (z = -RD, facing +z)
  poly([[-RW,0,-RD],[RW,0,-RD],[RW,CH,-RD],[-RW,CH,-RD]], WC, WE);
  poly([[-RW,0,-RD],[RW,0,-RD],[RW,BH,-RD],[-RW,BH,-RD]], BS, null);
  poly([[-RW,CH-CrH,-RD],[RW,CH-CrH,-RD],[RW,CH,-RD],[-RW,CH,-RD]], CR, null);
  // North wall (z = +RD, facing -z)
  poly([[RW,0,RD],[-RW,0,RD],[-RW,CH,RD],[RW,CH,RD]], WC, WE);
  poly([[RW,0,RD],[-RW,0,RD],[-RW,BH,RD],[RW,BH,RD]], BS, null);
  poly([[RW,CH-CrH,RD],[-RW,CH-CrH,RD],[-RW,CH,RD],[RW,CH,RD]], CR, null);
  // West wall (x = -RW, facing +x)
  poly([[-RW,0,RD],[-RW,0,-RD],[-RW,CH,-RD],[-RW,CH,RD]], WC, WE);
  poly([[-RW,0,RD],[-RW,0,-RD],[-RW,BH,-RD],[-RW,BH,RD]], BS, null);
  poly([[-RW,CH-CrH,RD],[-RW,CH-CrH,-RD],[-RW,CH,-RD],[-RW,CH,RD]], CR, null);
  // East wall (x = +RW, facing -x)
  poly([[RW,0,-RD],[RW,0,RD],[RW,CH,RD],[RW,CH,-RD]], WC, WE);
  poly([[RW,0,-RD],[RW,0,RD],[RW,BH,RD],[RW,BH,-RD]], BS, null);
  poly([[RW,CH-CrH,-RD],[RW,CH-CrH,RD],[RW,CH,RD],[RW,CH,-RD]], CR, null);

  // ── POOL ──
  // Water surface — animated color
  const wc=waterColor(t);
  poly([[PX1,WATER_Y,PZ1],[PX2,WATER_Y,PZ1],[PX2,WATER_Y,PZ2],[PX1,WATER_Y,PZ2]], wc, null);

  // Pool inner walls (inside the pool below floor, going "infinitely" deep via a distant floor)
  const POOL_DEEP_Y = -8000; // appears infinite
  const PWC=CFG.POOL_WALL;
  // South inner wall (z=PZ1, faces +z into pool)
  poly([[PX2,WATER_Y,PZ1],[PX1,WATER_Y,PZ1],[PX1,POOL_DEEP_Y,PZ1],[PX2,POOL_DEEP_Y,PZ1]], PWC, null);
  // North inner wall (z=PZ2, faces -z)
  poly([[PX1,WATER_Y,PZ2],[PX2,WATER_Y,PZ2],[PX2,POOL_DEEP_Y,PZ2],[PX1,POOL_DEEP_Y,PZ2]], PWC, null);
  // West inner wall (x=PX1, faces +x)
  poly([[PX1,WATER_Y,PZ1],[PX1,WATER_Y,PZ2],[PX1,POOL_DEEP_Y,PZ2],[PX1,POOL_DEEP_Y,PZ1]], PWC, null);
  // East inner wall (x=PX2, faces -x)
  poly([[PX2,WATER_Y,PZ2],[PX2,WATER_Y,PZ1],[PX2,POOL_DEEP_Y,PZ1],[PX2,POOL_DEEP_Y,PZ2]], PWC, null);
  // Deep "floor" — appears as a faint glow far below (fog makes it nearly invisible — infinite feel)
  poly([[PX1,POOL_DEEP_Y,PZ1],[PX2,POOL_DEEP_Y,PZ1],[PX2,POOL_DEEP_Y,PZ2],[PX1,POOL_DEEP_Y,PZ2]], CFG.POOL_FLOOR, null);
}

// ── COLLISION ────────────────────────────────────────────────────────────
// Player stays inside room walls and cannot pass through pool inner walls.
function clampToRoom(nx, nz, isSwimming){
  nx = Math.max(-RW+P_RAD, Math.min(RW-P_RAD, nx));
  nz = Math.max(-RD+P_RAD, Math.min(RD-P_RAD, nz));
  const ox = player.wx, oz = player.wz;
  const inPoolNow = nx > PX1 && nx < PX2 && nz > PZ1 && nz < PZ2;
  const wasInPool  = ox > PX1 && ox < PX2 && oz > PZ1 && oz < PZ2;
  const atSurface  = player.wy >= CFG.CAMERA_H + CFG.SURFACE_FLOAT_Y - 5;
  if (inPoolNow && !atSurface) {
    nx = Math.max(PX1+P_RAD, Math.min(PX2-P_RAD, nx));
    nz = Math.max(PZ1+P_RAD, Math.min(PZ2-P_RAD, nz));
  } else if (!wasInPool && !isSwimming && !player.isJumping) {
    if (nx > PX1-P_RAD && nx < PX2+P_RAD && nz > PZ1-P_RAD && nz < PZ2+P_RAD) {
      const pushWest  = (PX1 - P_RAD) - nx;
      const pushEast  = (PX2 + P_RAD) - nx;
      const pushSouth = (PZ1 - P_RAD) - nz;
      const pushNorth = (PZ2 + P_RAD) - nz;
      const pX = Math.abs(pushWest) < Math.abs(pushEast) ? pushWest : pushEast;
      const pZ = Math.abs(pushSouth) < Math.abs(pushNorth) ? pushSouth : pushNorth;
      if (Math.abs(pX) < Math.abs(pZ)) nx += pX;
      else nz += pZ;
    }
  }
  return [nx, nz];
}

// ── UPDATE ────────────────────────────────────────────────────────────────
let lastTime=0;

function inPoolFootprint(x,z){
  return x>PX1 && x<PX2 && z>PZ1 && z<PZ2;
}

function update(dt){
  waterTime+=dt;
  if(isMobile&&(touchLookDX||touchLookDY)){
    player.yaw+=touchLookDX*0.008; player.pitch-=touchLookDY*0.008;
    touchLookDX=0; touchLookDY=0;
  }else{
    player.yaw+=mouseDX*CFG.MOUSE_SENS; player.pitch-=mouseDY*CFG.MOUSE_SENS;
    mouseDX=0; mouseDY=0;
  }
  player.pitch=Math.max(-1.4, Math.min(1.4, player.pitch));
  zoomFOV+=(zoomTarget-zoomFOV)*0.15;
  applyJoystickToKeys();

  // ── Is player in the pool water? ──
  const inPool = inPoolFootprint(player.wx, player.wz);
  const wasSwimming = player.isSwimming;
  // Swimming as soon as they're over the pool — water catches them immediately
  player.isSwimming = inPool;
  // Underwater = camera below water surface (y < CAMERA_H means head is under)
  player.isUnderwater = inPool && player.wy < CFG.CAMERA_H;

  // First frame entering pool: kill upward velocity so they sink immediately
  if(player.isSwimming && !wasSwimming){
    if(player.velY > 0) player.velY = 0;
    // Give a small downward nudge so they visibly sink before floating back
    player.velY = -80;
    player.isJumping = false;
    player.jumpsUsed = 0;
  }

  if(player.isSwimming){
    // ── SWIMMING PHYSICS ──
    const diving = keys['KeyC']||keys['ControlLeft']||keys['ControlRight'];

    if(diving){
      // Actively diving: overcome buoyancy, pull down
      player.velY -= CFG.BUOYANCY * 1.8 * dt;
    } else {
      // No input: buoyancy pushes you up naturally
      // Net force = buoyancy (up) - gravity (down)
      const netUp = CFG.BUOYANCY - CFG.GRAVITY * 0.35;
      player.velY += netUp * dt;
    }

    // Water drag — slows velocity so you don't rocket around
    player.velY *= Math.pow(1 - CFG.WATER_DRAG * dt, 1);

    player.wy += player.velY * dt;

    // Surface cap — float at just below water line, bob gently
    const surfaceY = CFG.CAMERA_H + CFG.SURFACE_FLOAT_Y;
    if(player.wy > surfaceY && player.velY > 0){
      player.wy = surfaceY;
      player.velY = 0;
    }

    // No hard bottom — pool is "infinite"
    player.isJumping = false;
    player.jumpsUsed = 0;
    player.isCrouching = false;

  } else {
    // ── NORMAL LAND PHYSICS ──
    if((keys['Space']||keys['KeyF'])&&!player.isCrouching&&player.jumpsUsed<2){
      player.velY=CFG.JUMP_VEL; player.jumpsUsed++; player.isJumping=true;
    }
    player.isCrouching=!!(keys['KeyC']||keys['ControlLeft']||keys['ControlRight']);
    player.velY-=CFG.GRAVITY*dt; player.wy+=player.velY*dt;
    const floorY=CFG.CAMERA_H+(player.isCrouching?-(CFG.CAMERA_H-CFG.CROUCH_H):0);
    const overPool = inPoolFootprint(player.wx, player.wz);
    if(!overPool && player.wy<=floorY&&player.velY<=0){
      const was=player.isJumping; player.wy=floorY; player.velY=0;
      player.isJumping=false; player.jumpsUsed=0; if(was)player.landThud=true;
    }
    if(player.wy>CH-CFG.CAMERA_H/2){player.wy=CH-CFG.CAMERA_H/2;if(player.velY>0)player.velY=0;}
  }

  player.isRunning=(keys['ShiftLeft']||keys['ShiftRight'])&&!player.isCrouching&&!player.isSwimming;
  let speed = player.isSwimming ? CFG.SWIM_SPEED :
              (player.isRunning ? CFG.RUN_SPEED : CFG.WALK_SPEED);
  if(player.isCrouching&&!player.isSwimming) speed*=CFG.CROUCH_SPEED;

  const fX=Math.sin(player.yaw),fZ=Math.cos(player.yaw),rX=Math.cos(player.yaw),rZ=-Math.sin(player.yaw);
  let mx=0,mz=0; player.isMoving=false;
  if(keys['KeyW']||keys['ArrowUp']){mx+=fX*speed*dt;mz+=fZ*speed*dt;player.isMoving=true;}
  if(keys['KeyS']||keys['ArrowDown']){mx-=fX*speed*dt;mz-=fZ*speed*dt;player.isMoving=true;}
  if(keys['KeyD']||keys['ArrowRight']){mx+=rX*speed*dt;mz+=rZ*speed*dt;player.isMoving=true;}
  if(keys['KeyA']||keys['ArrowLeft']){mx-=rX*speed*dt;mz-=rZ*speed*dt;player.isMoving=true;}
  // Pass swimming state so pool walls don't block movement when in water
  const[cx,cz]=clampToRoom(player.wx+mx, player.wz+mz, player.isSwimming);
  player.wx=cx; player.wz=cz;

  const bob=player.isMoving&&!player.isJumping&&!player.isSwimming;
  if(bob)player.bobTime+=dt*CFG.HEAD_BOB_SPEED;
  // Gentle swim sway when underwater
  if(player.isSwimming&&player.isMoving)player.bobTime+=dt*CFG.HEAD_BOB_SPEED*0.4;
  player.shakeTime+=dt;
  const bobY=bob?Math.sin(player.bobTime*2*Math.PI)*CFG.HEAD_BOB_AMT:
             (player.isSwimming?Math.sin(player.bobTime*2*Math.PI)*2.5:0);
  const bobX=bob?Math.sin(player.bobTime*Math.PI)*CFG.HEAD_BOB_SWAY:
             (player.isSwimming?Math.sin(player.bobTime*Math.PI)*1.2:0);
  const shkX=Math.sin(player.shakeTime*13.7)*0.08,shkY=Math.cos(player.shakeTime*11.3)*0.08;
  const crO=player.isCrouching?-(CFG.CAMERA_H-CFG.CROUCH_H):0;
  const sM=player.isMoving?0.25:1.0,sY=(player.isCrouching||player.isJumping||player.isSwimming)?0.35:sM;
  player.wxs+=(player.wx+bobX+shkX-player.wxs)*sM;
  player.wys+=(player.wy+crO+bobY+shkY-player.wys)*sY;
  player.wzs+=(player.wz-player.wzs)*sM;
  player.yaws+=(player.yaw-player.yaws)*0.3;
  player.pitchs+=(player.pitch-player.pitchs)*0.3;

  // Update underwater vignette overlay — fade in only once fully submerged
  const vig=document.getElementById('underwater-vignette');
  if(player.isUnderwater){
    const submergeDepth = CFG.CAMERA_H - player.wy;
    const vigOpacity = Math.min(1, submergeDepth / 20);
    vig.style.opacity = vigOpacity.toFixed(3);
    vig.style.background='radial-gradient(ellipse at center, rgba(0,80,160,0.18) 30%, rgba(0,40,120,0.55) 100%)';
  } else {
    vig.style.opacity='0';
  }
}

// ── AUDIO ─────────────────────────────────────────────────────────────────
let audioCtx=null, masterGain=null, reverbNode=null;
let footstepTimer=0, audioReady=false;
function initAudio(){
  if(!audioReady){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume();
    masterGain=audioCtx.createGain(); masterGain.gain.value=0.7;
    masterGain.connect(audioCtx.destination);
    reverbNode=audioCtx.createConvolver();
    reverbNode.buffer=makeReverbIR(audioCtx,5.5,0.06); // long watery reverb
    const revG=audioCtx.createGain(); revG.gain.value=0.85;
    reverbNode.connect(revG); revG.connect(masterGain);
    // Low rumble drone — pool hum
    const d1=audioCtx.createOscillator(); d1.type='sine'; d1.frequency.value=42;
    const d2=audioCtx.createOscillator(); d2.type='sine'; d2.frequency.value=46;
    const d3=audioCtx.createOscillator(); d3.type='sine'; d3.frequency.value=68;
    const dg=audioCtx.createGain(); dg.gain.setValueAtTime(0,audioCtx.currentTime);
    dg.gain.linearRampToValueAtTime(0.09,audioCtx.currentTime+5);
    d1.connect(dg); d2.connect(dg); d3.connect(dg);
    dg.connect(masterGain); dg.connect(reverbNode);
    d1.start(); d2.start(); d3.start();
    // Water gurgle noise
    function noiseLoop(){
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const src=audioCtx.createBufferSource(); src.buffer=buf;
      const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=350;
      const bpf=audioCtx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=600; bpf.Q.value=0.5;
      const ng=audioCtx.createGain(); ng.gain.value=0.022;
      src.connect(lpf); lpf.connect(bpf); bpf.connect(ng); ng.connect(masterGain);
      src.start(); src.stop(audioCtx.currentTime+2); src.onended=noiseLoop;
    }
    noiseLoop(); audioReady=true;
  }else if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}
function makeReverbIR(ctx,dur,decay){
  const sr=ctx.sampleRate, len=sr*dur, buf=ctx.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){
      d[i]=(Math.random()*2-1)*Math.exp(-decay*i/sr*12);
      if(i===Math.floor(0.03*sr)||i===Math.floor(0.06*sr))d[i]+=(Math.random()*2-1)*0.4;
    }
  }
  return buf;
}
function playFootstep(){
  if(!audioReady)return;
  const t=audioCtx.currentTime, dur=0.18;
  const nb=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource(); ns.buffer=nb;
  const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=300;
  const bo=audioCtx.createOscillator(); bo.type='sine'; bo.frequency.setValueAtTime(38,t); bo.frequency.exponentialRampToValueAtTime(18,t+dur);
  const be=audioCtx.createGain(); be.gain.setValueAtTime(0.16,t); be.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  const ne=audioCtx.createGain(); ne.gain.setValueAtTime(0,t); ne.gain.linearRampToValueAtTime(0.20,t+0.008); ne.gain.linearRampToValueAtTime(0,t+dur);
  const sg=audioCtx.createGain(); sg.gain.value=0.35;
  ns.connect(lpf); lpf.connect(ne); ne.connect(sg); bo.connect(be); be.connect(sg); sg.connect(masterGain);
  const srv=audioCtx.createGain(); srv.gain.value=0.4; sg.connect(srv); srv.connect(reverbNode);
  ns.start(t); ns.stop(t+dur); bo.start(t); bo.stop(t+dur);
}
function playLandThud(){
  if(!audioReady)return;
  const t=audioCtx.currentTime, dur=0.22;
  const nb=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource(); ns.buffer=nb;
  const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=220;
  const bo=audioCtx.createOscillator(); bo.type='sine'; bo.frequency.setValueAtTime(50,t); bo.frequency.exponentialRampToValueAtTime(18,t+dur);
  const be=audioCtx.createGain(); be.gain.setValueAtTime(0.28,t); be.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  const ne=audioCtx.createGain(); ne.gain.setValueAtTime(0,t); ne.gain.linearRampToValueAtTime(0.40,t+0.01); ne.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  const sg=audioCtx.createGain(); sg.gain.value=0.55;
  ns.connect(lpf); lpf.connect(ne); ne.connect(sg); bo.connect(be); be.connect(sg); sg.connect(masterGain);
  const rv=audioCtx.createGain(); rv.gain.value=0.45; sg.connect(rv); rv.connect(reverbNode);
  ns.start(t); ns.stop(t+dur); bo.start(t); bo.stop(t+dur);
}
function playSplash(){
  if(!audioReady)return;
  const t=audioCtx.currentTime;
  // Noise burst filtered to a watery mid-range
  const dur=0.22;
  const nb=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource(); ns.buffer=nb;
  // Bandpass centred around splash frequencies
  const bpf=audioCtx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=900; bpf.Q.value=0.8;
  const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2800;
  // Sharp attack, quick decay
  const ne=audioCtx.createGain();
  ne.gain.setValueAtTime(0,t);
  ne.gain.linearRampToValueAtTime(0.28,t+0.004);
  ne.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  // Subtle low plop — water displacement
  const plop=audioCtx.createOscillator(); plop.type='sine';
  plop.frequency.setValueAtTime(180,t);
  plop.frequency.exponentialRampToValueAtTime(60,t+0.12);
  const pe=audioCtx.createGain();
  pe.gain.setValueAtTime(0.10,t);
  pe.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
  const sg=audioCtx.createGain(); sg.gain.value=0.45;
  ns.connect(bpf); bpf.connect(lpf); lpf.connect(ne); ne.connect(sg);
  plop.connect(pe); pe.connect(sg);
  sg.connect(masterGain);
  // Wet reverb send
  const rv=audioCtx.createGain(); rv.gain.value=0.6; sg.connect(rv); rv.connect(reverbNode);
  ns.start(t); ns.stop(t+dur); plop.start(t); plop.stop(t+0.14);
}
function updateFootsteps(dt){
  if(player.landThud){player.landThud=false;playLandThud();footstepTimer=0;return;}
  if(!player.isMoving||player.isJumping){footstepTimer=0;return;}
  if(player.isSwimming){
    // Slower cadence for swimming, splash sound instead of footstep
    const interval=player.isUnderwater?0.55:0.38;
    footstepTimer+=dt;
    if(footstepTimer>=interval){footstepTimer-=interval;playSplash();}
    return;
  }
  const interval=player.isRunning?0.30:player.isCrouching?0.72:0.52;
  footstepTimer+=dt;
  if(footstepTimer>=interval){footstepTimer-=interval;playFootstep();}
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  ctx.fillStyle=rgb(...CFG.BG_COL); ctx.fillRect(0,0,W,H);
  emitRoom(waterTime);
  flush();
  // Overlay water shimmer lines on top
  drawWaterShimmer(waterTime);
  // Underwater full tint when camera is submerged
  if(player.isUnderwater){
    const depth=Math.max(0,-player.wys)/200;
    const alpha=Math.min(0.45, 0.22+depth*0.12);
    ctx.fillStyle=`rgba(10,80,180,${alpha.toFixed(3)})`;
    ctx.fillRect(0,0,W,H);
  } else {
    const pitchDown=player.pitchs;
    if(pitchDown<-0.2){
      const alpha=Math.min(0.1,((-pitchDown-0.2)/0.8)*0.1);
      ctx.fillStyle=`rgba(40,140,220,${alpha.toFixed(3)})`;
      ctx.fillRect(0,0,W,H);
    }
  }
  // Zoom vignette
  const zT=Math.max(0,1-(zoomFOV-ZOOM_MIN)/(CFG.FOV_DEG-ZOOM_MIN));
  if(zT>0.01){
    const g=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.8);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,`rgba(0,0,0,${(zT*0.75).toFixed(2)})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
}

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  if(mouseLocked){update(dt);updateFootsteps(dt);}
  if(mouseLocked)render();
  requestAnimationFrame(loop);
}
if(!isMobile)document.getElementById('overlay-hint').textContent='CLICK TO ENTER';
setupMobileControls();
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
</script>
