<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE ROOMS</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
  body { background: #000; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
  canvas { display: block; cursor: none; touch-action: none; }
  #overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: #6080ff; z-index: 10;
  }
  #overlay h1 { font-size: clamp(1.4rem,6vw,3rem); letter-spacing: 0.4em; margin-bottom: 1rem; text-shadow: 0 0 40px #4060ff88; }
  #overlay p  { color: #aaa; margin: 0.3rem 0; font-size: clamp(0.65rem,2vw,0.85rem); }
  #overlay .hint { color: #6080ff; margin-top: 1.5rem; font-size: clamp(0.85rem,2.5vw,1rem); animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #menu-btn {
    position: fixed; top: 1rem; left: 1rem; z-index: 50;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem; letter-spacing: 0.25em;
    color: rgba(96,128,255,0.5); background: transparent;
    border: 1px solid rgba(96,128,255,0.25);
    padding: 0.35rem 0.7rem; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, opacity 0.2s;
    text-decoration: none; display: block;
    opacity: 0; pointer-events: none;
  }
  #menu-btn.visible { opacity: 1; pointer-events: all; }
  #menu-btn:hover { color: #6080ff; border-color: rgba(96,128,255,0.7); background: rgba(96,128,255,0.07); }
  #fade-out { position: fixed; inset: 0; z-index: 99; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in; }
  #fade-out.go { opacity: 1; pointer-events: all; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fade-out"></div>
<a id="menu-btn" href="index.html" onclick="var f=document.getElementById('fade-out');f.classList.add('go');setTimeout(function(){window.location.href='index.html';},420);return false;">‹ MENU</a>
<div id="overlay">
  <h1>THE ROOMS</h1>
  <p>Walk through any doorway · Infinite procedural rooms</p>
  <p style="color:#666;font-size:0.75rem;margin-top:0.5rem;">WASD · Mouse · Shift to run · Space to jump</p>
  <div class="hint" id="overlay-hint">CLICK TO ENTER</div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CFG = {
  NEAR:           1,
  FOV_DEG:        90,
  WALK_SPEED:     160,
  RUN_SPEED:      320,
  MOUSE_SENS:     0.0018,
  HEAD_BOB_SPEED: 3.0,
  HEAD_BOB_AMT:   4,
  HEAD_BOB_SWAY:  1.5,
  CAMERA_H:       50,
  CROUCH_H:       24,
  JUMP_VEL:       280,
  GRAVITY:        700,
  CROUCH_SPEED:   0.6,
  RENDER_DIST:    12000,
  ROOM_W:   2800,   // full width
  ROOM_D:   2800,   // full depth
  ROOM_H:   900,    // height
  HALL_LEN: 1800,   // length of connecting hallway
  // CRITICAL: HALL_W must equal DOORWAY_W — hallway slots exactly into doorway opening
  DOOR_W:   240,    // doorway opening width (half = 120)
  DOOR_H:   300,    // doorway opening height
  FLOOR_COL:   [18,  35, 120],
  FLOOR_COL2:  [22,  45, 140],
  CEIL_COL:    [190, 175,  90],
  WALL_COL:    [210, 190,  80],
  WALL_EDGE:   [240, 220, 100],
  BASEBOARD:   [170, 150,  60],
  CROWN:       [180, 160,  70],
  BG_COL:      [6,    8,  20],
};

// Derived — hallway half-width = doorway half-width so they're flush
const DW = CFG.DOOR_W / 2;   // doorway half-width = hall half-width
const DH = CFG.DOOR_H;       // doorway height
const RW = CFG.ROOM_W / 2;
const RD = CFG.ROOM_D / 2;
const FY = 0;
const CY = CFG.ROOM_H;
const BH = 14;   // baseboard height
const CH = 16;   // crown height

// ─── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
function rgb(r,g,b) { return `rgb(${r|0},${g|0},${b|0})`; }

// ─── SEEDED RNG ────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── WORLD GRAPH ───────────────────────────────────────────────────────────
// Rooms on an integer grid (rx, rz).
// Between adjacent rooms is a hallway.
// Grid spacing = ROOM_SIZE + HALL_LEN so rooms don't overlap.
//
// COORDINATE CONVENTION:
//   N-hall from (rx,rz): connects room(rx,rz) [near/south end, z = room.wz + RD]
//                    to  room(rx,rz+1) [far/north end, z = room(rx,rz+1).wz - RD]
//   E-hall from (rx,rz): connects room(rx,rz) [near/west end, x = room.wx + RW]
//                    to  room(rx+1,rz) [far/east end, x = room(rx+1,rz).wx - RW]
//
// Hall geometry: 4 long panels (floor, ceiling, left wall, right wall).
// NO end-cap walls — the room wall IS the cap on each end.
// The hallway opening exactly matches the doorway: width=DOOR_W, height 0..DOOR_H.
// Above DOOR_H on the room wall there IS wall (closing above the arch).

const GRID_X = CFG.ROOM_W + CFG.HALL_LEN;  // world-x spacing between room centres
const GRID_Z = CFG.ROOM_D + CFG.HALL_LEN;  // world-z spacing

const spaces = new Map();

// ─── PROCEDURAL ROOM PROPS ─────────────────────────────────────────────────
// Ported from main.py: seeded pillars + wall segments per room
const roomProps = new Map(); // roomKey -> array of prop objects

function generateRoomProps(rx, rz) {
  const k = roomKey(rx, rz);
  if (roomProps.has(k)) return roomProps.get(k);

  const props = [];
  // Skip starting room (0,0) — keep it empty like main.py
  if (rx === 0 && rz === 0) { roomProps.set(k, props); return props; }

  // Seeded RNG matching main.py: seed = hash((room_x, room_y)) % 1000
  // We replicate: seed = (rx * 73856093 ^ rz * 19349663) & 0x7FFFFFFF) % 1000
  const seed = (Math.abs(rx * 73856093 ^ rz * 19349663)) % 1000;
  const rng = mulberry32(seed + 42);

  const numFeatures = 2 + Math.floor(rng() * 4); // 2..5 like main.py

  // Safe zone margins (keep clear of doorways)
  const MARGIN  = 300;   // distance from room edge
  const DOOR_CLEAR = DW + 120; // clearance around doorway centre

  function safePlacement(wx, wz, halfW, halfD) {
    // Must not be too close to any of the 4 doorway centres
    const doorways = [
      [0, -RD], [0, +RD],  // N, S doorways (z-axis walls, centred on room)
      [-RW, 0], [+RW, 0],  // W, E doorways (x-axis walls)
    ];
    for (const [dx, dz] of doorways) {
      if (Math.abs(wx - dx) < DOOR_CLEAR + halfW &&
          Math.abs(wz - dz) < DOOR_CLEAR + halfD) return false;
    }
    return true;
  }

  for (let i = 0; i < numFeatures; i++) {
    if (rng() < 0.7) {
      // ── Pillar (square column) ──────────────────────────────
      const pillarSize = 40 + Math.floor(rng() * 80);  // 40..120 world units
      const halfP = pillarSize / 2;
      const rangeX = RW - MARGIN - halfP;
      const rangeZ = RD - MARGIN - halfP;
      if (rangeX <= 0 || rangeZ <= 0) continue;
      const px = (rng() * 2 - 1) * rangeX;
      const pz = (rng() * 2 - 1) * rangeZ;
      if (!safePlacement(px, pz, halfP, halfP)) continue;
      props.push({ type: 'pillar', px, pz, size: pillarSize });
    } else {
      // ── Wall segment ───────────────────────────────────────
      const horizontal = rng() < 0.5;
      const thickness = 20;
      if (horizontal) {
        const wallLen = 200 + Math.floor(rng() * 400); // 200..600
        const halfL = wallLen / 2;
        const rangeX = RW - MARGIN - halfL;
        const rangeZ = RD - MARGIN - thickness;
        if (rangeX <= 0 || rangeZ <= 0) continue;
        const wx = (rng() * 2 - 1) * rangeX;
        const wz = (rng() * 2 - 1) * rangeZ;
        if (!safePlacement(wx, wz, halfL, thickness)) continue;
        props.push({ type: 'wallH', px: wx, pz: wz, len: wallLen, thickness });
      } else {
        const wallLen = 200 + Math.floor(rng() * 400);
        const halfL = wallLen / 2;
        const rangeX = RW - MARGIN - thickness;
        const rangeZ = RD - MARGIN - halfL;
        if (rangeX <= 0 || rangeZ <= 0) continue;
        const wx = (rng() * 2 - 1) * rangeX;
        const wz = (rng() * 2 - 1) * rangeZ;
        if (!safePlacement(wx, wz, thickness, halfL)) continue;
        props.push({ type: 'wallV', px: wx, pz: wz, len: wallLen, thickness });
      }
    }
  }

  roomProps.set(k, props);
  return props;
}

// Colour palette for props — aged concrete / moist drywall
const PROP_WALL  = [185, 172, 115];  // yellowish aged wall, matches WALL_COLOR
const PROP_EDGE  = [220, 205, 135];  // highlight edge
const PROP_DARK  = [140, 128,  80];  // shaded face

// Emit 3D box at room-local position (cx, cz), half-extents (hw, hd), full height
function emitBox(room, cx, cz, hw, hd) {
  const ox = room.wx + cx, oz = room.wz + cz;
  const y0 = FY, y1 = CY;

  // Choose a shorter height for visual variety — 60..90% of room height
  // deterministically from position
  const heightFrac = 0.55 + ((Math.abs(cx * 7 + cz * 13) % 100) / 100) * 0.35;
  const yt = y0 + (y1 - y0) * heightFrac;

  const x0 = ox - hw, x1 = ox + hw;
  const z0 = oz - hd, z1 = oz + hd;

  // 4 vertical faces + top cap
  // Front face (z = z1)
  poly([[x0,y0,z1],[x1,y0,z1],[x1,yt,z1],[x0,yt,z1]], PROP_WALL, PROP_EDGE);
  // Back face  (z = z0)
  poly([[x1,y0,z0],[x0,y0,z0],[x0,yt,z0],[x1,yt,z0]], PROP_DARK, PROP_EDGE);
  // Right face (x = x1)
  poly([[x1,y0,z1],[x1,y0,z0],[x1,yt,z0],[x1,yt,z1]], PROP_WALL, PROP_EDGE);
  // Left face  (x = x0)
  poly([[x0,y0,z0],[x0,y0,z1],[x0,yt,z1],[x0,yt,z0]], PROP_DARK, PROP_EDGE);
  // Top cap
  poly([[x0,yt,z0],[x1,yt,z0],[x1,yt,z1],[x0,yt,z1]], [160,148,95], null);
}

function emitRoomProps(room) {
  const props = generateRoomProps(room.rx, room.rz);
  for (const p of props) {
    if (p.type === 'pillar') {
      emitBox(room, p.px, p.pz, p.size / 2, p.size / 2);
    } else if (p.type === 'wallH') {
      emitBox(room, p.px, p.pz, p.len / 2, p.thickness / 2);
    } else if (p.type === 'wallV') {
      emitBox(room, p.px, p.pz, p.thickness / 2, p.len / 2);
    }
  }
}

function roomKey(rx, rz) { return `R${rx},${rz}`; }
function hallKey(rx, rz, dir) { return `H${rx},${rz}${dir}`; }

function roomWX(rx) { return rx * GRID_X; }
function roomWZ(rz) { return rz * GRID_Z; }

function getOrCreateRoom(rx, rz) {
  const k = roomKey(rx, rz);
  if (spaces.has(k)) return spaces.get(k);
  const sp = { type:'room', rx, rz, wx: roomWX(rx), wz: roomWZ(rz) };
  spaces.set(k, sp);
  return sp;
}

function getOrCreateHall(rx, rz, dir) {
  const k = hallKey(rx, rz, dir);
  if (spaces.has(k)) return spaces.get(k);
  // Ensure both endpoint rooms exist
  getOrCreateRoom(rx, rz);
  if (dir === 'N') getOrCreateRoom(rx, rz+1);
  else              getOrCreateRoom(rx+1, rz);

  const roomA = spaces.get(roomKey(rx, rz));
  let wx, wz, axis;
  if (dir === 'N') {
    // Hall runs along Z, centred at roomA.wx, between roomA.wz+RD and roomA.wz+RD+HALL_LEN
    wx   = roomA.wx;
    wz   = roomA.wz + RD + CFG.HALL_LEN / 2;
    axis = 'Z';
  } else { // E
    wx   = roomA.wx + RW + CFG.HALL_LEN / 2;
    wz   = roomA.wz;
    axis = 'X';
  }
  const sp = {
    type:'hall', rx, rz, dir, axis, wx, wz,
    roomAKey: roomKey(rx, rz),
    roomBKey: dir === 'N' ? roomKey(rx, rz+1) : roomKey(rx+1, rz),
  };
  spaces.set(k, sp);
  return sp;
}

function preloadAroundRoom(rx, rz) {
  for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
    getOrCreateRoom(rx+dr, rz+dc);
    generateRoomProps(rx+dr, rz+dc);  // pre-seed procedural props
    // Ensure all 4 halls for each room in the 3x3 block
    getOrCreateHall(rx+dr, rz+dc, 'N');
    getOrCreateHall(rx+dr, rz+dc, 'E');
  }
}

// ─── PLAYER ────────────────────────────────────────────────────────────────
let currentSpaceKey = roomKey(0, 0);
function getCurrentSpace() { return spaces.get(currentSpaceKey); }

const player = {
  wx:0, wy: CFG.CAMERA_H+2, wz:0,
  wxs:0, wys: CFG.CAMERA_H+2, wzs:0,
  yaw:0, pitch:0, yaws:0, pitchs:0,
  bobTime:0, shakeTime:Math.random()*100,
  isMoving:false, isRunning:false, isJumping:false, isCrouching:false,
  jumpsUsed:0, velY:0, landThud:false,
};

// ─── INPUT ─────────────────────────────────────────────────────────────────
const isTouchDevice = ('ontouchstart' in window)||(navigator.maxTouchPoints>0);
let isMobile = isTouchDevice;
const keys = {};
let mouseLocked=false, mouseDX=0, mouseDY=0;
document.addEventListener('keydown', e=>{ keys[e.code]=true; });
document.addEventListener('keyup',   e=>{ keys[e.code]=false; });

const joy   = { active:false, id:-1, baseX:0, baseY:0, dx:0, dy:0 };
const lookT = { active:false, id:-1, lastX:0, lastY:0 };
let touchLookDX=0, touchLookDY=0;

function setupMobileControls() {
  if (!isMobile) return;
  document.getElementById('overlay-hint').textContent = 'TAP TO ENTER';
  const JR = 52;
  document.addEventListener('touchstart', e=>{
    e.preventDefault(); initAudio();
    if (!mouseLocked) { enterMobile(); return; }
    for (const t of e.changedTouches) {
      if (t.clientX/window.innerWidth < 0.45) {
        if (joy.active) continue;
        joy.active=true; joy.id=t.identifier; joy.baseX=t.clientX; joy.baseY=t.clientY; joy.dx=0; joy.dy=0;
      } else {
        if (lookT.active) continue;
        lookT.active=true; lookT.id=t.identifier; lookT.lastX=t.clientX; lookT.lastY=t.clientY;
      }
    }
  }, {passive:false});
  document.addEventListener('touchmove', e=>{
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier===joy.id) {
        let dx=t.clientX-joy.baseX, dy=t.clientY-joy.baseY;
        const mag=Math.sqrt(dx*dx+dy*dy);
        if (mag>JR) { dx=dx/mag*JR; dy=dy/mag*JR; }
        joy.dx=dx; joy.dy=dy;
      }
      if (t.identifier===lookT.id) {
        touchLookDX+=(t.clientX-lookT.lastX); touchLookDY+=(t.clientY-lookT.lastY);
        lookT.lastX=t.clientX; lookT.lastY=t.clientY;
      }
    }
  }, {passive:false});
  const endFn = e=>{
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier===joy.id)   { joy.active=false; joy.id=-1; joy.dx=0; joy.dy=0; keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false; }
      if (t.identifier===lookT.id) { lookT.active=false; lookT.id=-1; }
    }
  };
  document.addEventListener('touchend',    endFn, {passive:false});
  document.addEventListener('touchcancel', endFn, {passive:false});
}

function applyJoystickToKeys() {
  if (!isMobile) return;
  if (!joy.active||(joy.dx===0&&joy.dy===0)) { keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false; return; }
  const mag=Math.sqrt(joy.dx*joy.dx+joy.dy*joy.dy);
  if (mag<10) { keys['KeyW']=keys['KeyS']=keys['KeyA']=keys['KeyD']=false; return; }
  const nx=joy.dx/mag, ny=joy.dy/mag;
  keys['KeyW']=ny<-0.25; keys['KeyS']=ny>0.25; keys['KeyD']=nx>0.25; keys['KeyA']=nx<-0.25;
}

function enterMobile()  { initAudio(); mouseLocked=true; document.getElementById('overlay').style.display='none'; document.getElementById('menu-btn').classList.remove('visible'); }
function enterDesktop() { initAudio(); canvas.requestPointerLock(); }

document.addEventListener('mousemove', e=>{ if (!mouseLocked) return; mouseDX+=e.movementX; mouseDY+=e.movementY; });
let zoomFOV=CFG.FOV_DEG, zoomTarget=CFG.FOV_DEG;
const ZOOM_MIN=8, ZOOM_MAX=100, ZOOM_STEP=6;
document.addEventListener('wheel', e=>{ if (!mouseLocked) return; zoomTarget=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomTarget+Math.sign(e.deltaY)*ZOOM_STEP)); }, {passive:true});
document.getElementById('overlay').addEventListener('click', ()=>{ if (isMobile) enterMobile(); else enterDesktop(); });
document.getElementById('overlay').addEventListener('touchstart', e=>{ e.preventDefault(); enterMobile(); }, {passive:false});
canvas.addEventListener('click', ()=>{ if (!isMobile&&!mouseLocked) enterDesktop(); });
document.addEventListener('pointerlockchange', ()=>{
  if (isMobile) return;
  mouseLocked = document.pointerLockElement===canvas;
  if (mouseLocked && audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  document.getElementById('overlay').style.display = mouseLocked ? 'none' : 'flex';
  document.getElementById('menu-btn').classList.toggle('visible', !mouseLocked);
});

// ─── CAMERA ────────────────────────────────────────────────────────────────
function worldToCamera(wx,wy,wz) {
  let x=wx-player.wxs, y=wy-player.wys, z=wz-player.wzs;
  const yaw=-player.yaws;
  const x1= x*Math.cos(yaw)+z*Math.sin(yaw);
  const z1=-x*Math.sin(yaw)+z*Math.cos(yaw);
  const cp=Math.cos(player.pitchs), sp=Math.sin(player.pitchs);
  return [x1, y*cp-z1*sp, y*sp+z1*cp];
}
function project(cx,cy,cz) {
  if (cz<=CFG.NEAR) return null;
  const aspect=H/W, focal=(W*0.5)/Math.tan((zoomFOV*0.5)*Math.PI/180);
  const s=focal/cz;
  const sx=W*0.5+cx*s, sy=H*0.5-cy*s*aspect;
  return (isFinite(sx)&&isFinite(sy)) ? [sx,sy] : null;
}
function clipNear(poly) {
  if (!poly||poly.length<3) return [];
  const N=CFG.NEAR, ins=p=>p[2]>=N;
  const ix=(a,b)=>{ const dz=b[2]-a[2]; if(Math.abs(dz)<1e-7) return null; const t=(N-a[2])/dz; return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,N+0.001]; };
  const out=[]; let prev=poly[poly.length-1], pi=ins(prev);
  for (const cur of poly) {
    const ci=ins(cur);
    if (ci&&pi) out.push(cur);
    else if (ci&&!pi) { const i=ix(prev,cur); if(i) out.push(i); out.push(cur); }
    else if (!ci&&pi) { const i=ix(prev,cur); if(i) out.push(i); }
    prev=cur; pi=ci;
  }
  return out.length>=3 ? out : [];
}
function fog(r,g,b,d) {
  if (d<500) return [r,g,b];
  const t=Math.min(1,(d-500)/(CFG.RENDER_DIST-500));
  const [fr,fg,fb]=CFG.BG_COL;
  return [(r+(fr-r)*t)|0,(g+(fg-g)*t)|0,(b+(fb-b)*t)|0];
}

// ─── POLY QUEUE ────────────────────────────────────────────────────────────
const _pq = [];
function poly(pts, color, edgeColor) {
  let ax=0,ay=0,az=0;
  for (const [x,y,z] of pts) { ax+=x; ay+=y; az+=z; }
  const n=pts.length; ax/=n; ay/=n; az/=n;
  const dx=ax-player.wxs, dy=ay-player.wys, dz=az-player.wzs;
  _pq.push({ d:dx*dx+dy*dy+dz*dz, pts, color, edgeColor });
}
function flush() {
  _pq.sort((a,b)=>b.d-a.d);
  for (const {pts,color,edgeColor} of _pq) {
    const cam=pts.map(([x,y,z])=>worldToCamera(x,y,z));
    if (cam.every(p=>p[2]<CFG.NEAR)) continue;
    let ax=0,ay=0,az=0; for(const p of cam){ax+=p[0];ay+=p[1];az+=p[2];} ax/=cam.length;ay/=cam.length;az/=cam.length;
    const dist=Math.sqrt(ax*ax+az*az);
    if (dist>CFG.RENDER_DIST*1.5) continue;
    let [r,g,b]=color; [r,g,b]=fog(r,g,b,dist);
    const cl=clipNear(cam); if(cl.length<3) continue;
    const sc=cl.map(([cx,cy,cz])=>project(cx,cy,cz)); if(sc.some(p=>!p)) continue;
    const mnX=Math.min(...sc.map(p=>p[0])),mxX=Math.max(...sc.map(p=>p[0]));
    const mnY=Math.min(...sc.map(p=>p[1])),mxY=Math.max(...sc.map(p=>p[1]));
    if(mxX<-200||mnX>W+200||mxY<-200||mnY>H+200) continue;
    if((mxX-mnX)<0.4&&(mxY-mnY)<0.4) continue;
    ctx.beginPath(); ctx.moveTo(sc[0][0],sc[0][1]);
    for (let i=1;i<sc.length;i++) ctx.lineTo(sc[i][0],sc[i][1]);
    ctx.closePath(); ctx.fillStyle=rgb(r,g,b); ctx.fill();
    if (edgeColor) {
      let [er,eg,eb]=edgeColor; [er,eg,eb]=fog(er,eg,eb,dist);
      ctx.strokeStyle=rgb(er,eg,eb); ctx.lineWidth=1.2; ctx.stroke();
    }
  }
  _pq.length=0;
}

// ─── GEOMETRY ──────────────────────────────────────────────────────────────
// Rooms and hallways emit polygons in WORLD space.
// Key insight: hallways have NO end-cap walls.
// The room wall panel above the doorway arch closes off the top.
// The opening below DOOR_H is empty — that's where the hall passes through.

function emitRoom(room) {
  const ox=room.wx, oz=room.wz;
  function P(x,y,z) { return [ox+x, y, oz+z]; }
  const W2=CFG.WALL_COL, WE=CFG.WALL_EDGE, BS=CFG.BASEBOARD, CR=CFG.CROWN;
  const FC=CFG.FLOOR_COL, FC2=CFG.FLOOR_COL2, CC=CFG.CEIL_COL;

  // ── Floor checkerboard
  const T=280;
  for (let ti=0,nx=Math.ceil(CFG.ROOM_W/T); ti<nx; ti++) {
    for (let tj=0,nz=Math.ceil(CFG.ROOM_D/T); tj<nz; tj++) {
      const tx=-RW+ti*T, tz=-RD+tj*T;
      poly([P(tx,FY,tz),P(tx+T,FY,tz),P(tx+T,FY,tz+T),P(tx,FY,tz+T)], (ti+tj)%2?FC2:FC, null);
    }
  }
  // ── Ceiling
  const CT=560;
  for (let ti=0,nx=Math.ceil(CFG.ROOM_W/CT); ti<nx; ti++) {
    for (let tj=0,nz=Math.ceil(CFG.ROOM_D/CT); tj<nz; tj++) {
      const tx=-RW+ti*CT, tz=-RD+tj*CT;
      poly([P(tx,CY,tz),P(tx+CT,CY,tz),P(tx+CT,CY,tz+CT),P(tx,CY,tz+CT)], CC, null);
    }
  }
  // Glow strip on ceiling
  poly([P(-200,CY-1,-400),P(200,CY-1,-400),P(200,CY-1,400),P(-200,CY-1,400)], [230,215,130], null);

  // ── Wall helper: emit a wall with doorway cutout on one of 4 sides
  // For each wall: left solid, right solid, above-arch solid. No fill below arch.
  function wallWithDoor_NZ(z) {
    // North or South wall at world-z = oz+z, runs x = -RW..RW, doorway centred at ox
    // doorway: x = -DW..DW, y = 0..DH
    poly([P(-RW,FY,z),P(-DW,FY,z),P(-DW,CY,z),P(-RW,CY,z)], W2, WE);          // left panel
    poly([P(DW,FY,z),P(RW,FY,z),P(RW,CY,z),P(DW,CY,z)], W2, WE);              // right panel
    poly([P(-DW,DH,z),P(DW,DH,z),P(DW,CY,z),P(-DW,CY,z)], W2, WE);            // above arch
    poly([P(-RW,FY,z),P(-DW,FY,z),P(-DW,BH,z),P(-RW,BH,z)], BS, null);        // baseboard L
    poly([P(DW,FY,z),P(RW,FY,z),P(RW,BH,z),P(DW,BH,z)], BS, null);            // baseboard R
    poly([P(-RW,CY-CH,z),P(RW,CY-CH,z),P(RW,CY,z),P(-RW,CY,z)], CR, null);   // crown
  }
  function wallWithDoor_XW(x) {
    // West or East wall at world-x = ox+x, runs z = -RD..RD, doorway centred at oz
    // doorway: z = -DW..DW, y = 0..DH
    poly([P(x,FY,-RD),P(x,FY,-DW),P(x,CY,-DW),P(x,CY,-RD)], W2, WE);
    poly([P(x,FY,DW),P(x,FY,RD),P(x,CY,RD),P(x,CY,DW)], W2, WE);
    poly([P(x,DH,-DW),P(x,DH,DW),P(x,CY,DW),P(x,CY,-DW)], W2, WE);
    poly([P(x,FY,-RD),P(x,FY,-DW),P(x,BH,-DW),P(x,BH,-RD)], BS, null);
    poly([P(x,FY,DW),P(x,FY,RD),P(x,BH,RD),P(x,BH,DW)], BS, null);
    poly([P(x,CY-CH,-RD),P(x,CY-CH,RD),P(x,CY,RD),P(x,CY,-RD)], CR, null);
  }

  wallWithDoor_NZ(-RD);  // North
  wallWithDoor_NZ(+RD);  // South
  wallWithDoor_XW(-RW);  // West
  wallWithDoor_XW(+RW);  // East

  // ── Procedural props (pillars + wall segments from generation seed)
  emitRoomProps(room);
}

function emitHall(hall) {
  // A hallway is a rectangular tube with:
  //   - floor (tiled)
  //   - ceiling
  //   - two long side walls (solid, no interruptions)
  //   - NO end caps — the room walls close each end
  //
  // For axis=Z (N-hall): tube runs from wz-HL to wz+HL, width DW*2 along X, centred at wx.
  // For axis=X (E-hall): tube runs from wx-HL to wx+HL, width DW*2 along Z, centred at wz.
  //
  // The tube dimensions exactly match the doorway opening: width=DOOR_W, height=ROOM_H
  // (we use full room height for the tube walls so there's no gap above, but below DOOR_H
  //  on the room wall is open — that's all handled by the room geometry).

  const ox=hall.wx, oz=hall.wz;
  const HL=CFG.HALL_LEN/2;
  const FC=CFG.FLOOR_COL, FC2=CFG.FLOOR_COL2;
  const CC=CFG.CEIL_COL, WC=CFG.WALL_COL, WE=CFG.WALL_EDGE;
  const BS=CFG.BASEBOARD, CR=CFG.CROWN;

  if (hall.axis === 'Z') {
    // Hall runs along Z. Width along X = DW*2. Centre at (ox, oz).
    // Near end at oz-HL (flush with south room's north wall: room.wz + RD)
    // Far  end at oz+HL (flush with north room's south wall: room.wz+GRID_Z - RD = room.wz + RD + HALL_LEN)

    const zNear=oz-HL, zFar=oz+HL;

    // Floor
    const T=180;
    for (let t=0,n=Math.ceil(CFG.HALL_LEN/T); t<n; t++) {
      const tz=zNear+t*T, c=t%2?FC2:FC;
      poly([[ox-DW,FY,tz],[ox+DW,FY,tz],[ox+DW,FY,tz+T],[ox-DW,FY,tz+T]], c, null);
    }
    // Ceiling
    const CT=360;
    for (let t=0,n=Math.ceil(CFG.HALL_LEN/CT); t<n; t++) {
      const tz=zNear+t*CT;
      poly([[ox-DW,CY,tz],[ox+DW,CY,tz],[ox+DW,CY,tz+CT],[ox-DW,CY,tz+CT]], CC, null);
    }
    // Glow strip
    poly([[ox-30,CY-1,zNear],[ox+30,CY-1,zNear],[ox+30,CY-1,zFar],[ox-30,CY-1,zFar]], [230,215,130], null);

    // West wall (x = ox-DW)
    poly([[ox-DW,FY,zNear],[ox-DW,FY,zFar],[ox-DW,CY,zFar],[ox-DW,CY,zNear]], WC, WE);
    poly([[ox-DW,FY,zNear],[ox-DW,FY,zFar],[ox-DW,BH,zFar],[ox-DW,BH,zNear]], BS, null);
    poly([[ox-DW,CY-CH,zNear],[ox-DW,CY-CH,zFar],[ox-DW,CY,zFar],[ox-DW,CY,zNear]], CR, null);

    // East wall (x = ox+DW)
    poly([[ox+DW,FY,zFar],[ox+DW,FY,zNear],[ox+DW,CY,zNear],[ox+DW,CY,zFar]], WC, WE);
    poly([[ox+DW,FY,zFar],[ox+DW,FY,zNear],[ox+DW,BH,zNear],[ox+DW,BH,zFar]], BS, null);
    poly([[ox+DW,CY-CH,zFar],[ox+DW,CY-CH,zNear],[ox+DW,CY,zNear],[ox+DW,CY,zFar]], CR, null);

  } else { // axis === 'X'
    // Hall runs along X. Width along Z = DW*2. Centre at (ox, oz).
    const xNear=ox-HL, xFar=ox+HL;

    // Floor
    const T=180;
    for (let t=0,n=Math.ceil(CFG.HALL_LEN/T); t<n; t++) {
      const tx=xNear+t*T, c=t%2?FC2:FC;
      poly([[tx,FY,oz-DW],[tx+T,FY,oz-DW],[tx+T,FY,oz+DW],[tx,FY,oz+DW]], c, null);
    }
    // Ceiling
    const CT=360;
    for (let t=0,n=Math.ceil(CFG.HALL_LEN/CT); t<n; t++) {
      const tx=xNear+t*CT;
      poly([[tx,CY,oz-DW],[tx+CT,CY,oz-DW],[tx+CT,CY,oz+DW],[tx,CY,oz+DW]], CC, null);
    }
    // Glow strip
    poly([[xNear,CY-1,oz-30],[xFar,CY-1,oz-30],[xFar,CY-1,oz+30],[xNear,CY-1,oz+30]], [230,215,130], null);

    // North wall (z = oz-DW)
    poly([[xFar,FY,oz-DW],[xNear,FY,oz-DW],[xNear,CY,oz-DW],[xFar,CY,oz-DW]], WC, WE);
    poly([[xFar,FY,oz-DW],[xNear,FY,oz-DW],[xNear,BH,oz-DW],[xFar,BH,oz-DW]], BS, null);
    poly([[xFar,CY-CH,oz-DW],[xNear,CY-CH,oz-DW],[xNear,CY,oz-DW],[xFar,CY,oz-DW]], CR, null);

    // South wall (z = oz+DW)
    poly([[xNear,FY,oz+DW],[xFar,FY,oz+DW],[xFar,CY,oz+DW],[xNear,CY,oz+DW]], WC, WE);
    poly([[xNear,FY,oz+DW],[xFar,FY,oz+DW],[xFar,BH,oz+DW],[xNear,BH,oz+DW]], BS, null);
    poly([[xNear,CY-CH,oz+DW],[xFar,CY-CH,oz+DW],[xFar,CY,oz+DW],[xNear,CY,oz+DW]], CR, null);
  }
}

// ─── RENDER GATHERING ──────────────────────────────────────────────────────
function getSpacesToRender() {
  const out = new Set();
  const cs = getCurrentSpace();
  if (!cs) return out;
  out.add(currentSpaceKey);

  if (cs.type === 'room') {
    // Emit all 4 adjacent halls + their far rooms
    const {rx,rz} = cs;
    for (const [drx,drz,d] of [[0,1,'N'],[0,-1,'N'],[-1,0,'E'],[0,0,'E']]) {
      // N: hall(rx,rz,'N') and hall(rx,rz-1,'N') for south; E: hall(rx,rz,'E') and hall(rx-1,rz,'E') for west
    }
    // Simpler: enumerate all 4 halls by direction
    const halls = [
      hallKey(rx, rz,   'N'),   // north hall
      hallKey(rx, rz-1, 'N'),   // south hall (the N-hall of the room to our south)
      hallKey(rx,   rz, 'E'),   // east hall
      hallKey(rx-1, rz, 'E'),   // west hall
    ];
    for (const hk of halls) {
      if (!spaces.has(hk)) continue;
      out.add(hk);
      const h = spaces.get(hk);
      if (spaces.has(h.roomAKey)) out.add(h.roomAKey);
      if (spaces.has(h.roomBKey)) out.add(h.roomBKey);
    }
  } else {
    // In a hall: render both endpoint rooms + their other 3 halls each
    const {roomAKey, roomBKey} = cs;
    out.add(roomAKey);
    out.add(roomBKey);
    for (const rk of [roomAKey, roomBKey]) {
      const rm = spaces.get(rk);
      if (!rm) continue;
      const {rx,rz}=rm;
      for (const hk of [hallKey(rx,rz,'N'),hallKey(rx,rz-1,'N'),hallKey(rx,rz,'E'),hallKey(rx-1,rz,'E')]) {
        if (spaces.has(hk)) { out.add(hk); const h=spaces.get(hk); out.add(h.roomAKey); out.add(h.roomBKey); }
      }
    }
  }
  return out;
}

// ─── COLLISION ─────────────────────────────────────────────────────────────
// Strategy: check each wall segment. A wall blocks movement if the player
// crosses it AND is not within the doorway opening.
// Player radius for collision.
const P_RAD = 40;

function isWalkable(nx, nz) {
  // The player is walkable if they are inside at least one space's volume
  // (no margin needed here — spaces share walls exactly).
  // We check containment with a small inward test per-space, but allow
  // the player to be in the hallway tube OR the room volume.

  for (const sp of spaces.values()) {
    if (sp.type === 'room') {
      const dx = Math.abs(nx - sp.wx);
      const dz = Math.abs(nz - sp.wz);
      // Inside room volume (no margin — wall collision handled below)
      if (dx < RW && dz < RD) return true;
    } else {
      const HL = CFG.HALL_LEN / 2;
      if (sp.axis === 'Z') {
        if (Math.abs(nx - sp.wx) < DW && Math.abs(nz - sp.wz) < HL) return true;
      } else {
        if (Math.abs(nx - sp.wx) < HL && Math.abs(nz - sp.wz) < DW) return true;
      }
    }
  }
  return false;
}

// Returns true if position (nx,nz) with player radius P_RAD is blocked by any wall.
// Uses wall-segment collision: each solid wall face is a line segment.
// A doorway opening cuts a gap in that segment.
function isBlocked(nx, nz) {
  // For each room: check its 4 wall faces. Each face is solid except for the doorway slot.
  // Wall faces are at the room boundary. Doorway is centred on the room origin.
  for (const sp of spaces.values()) {
    if (sp.type !== 'room') continue;
    const rx0 = sp.wx - RW, rx1 = sp.wx + RW;
    const rz0 = sp.wz - RD, rz1 = sp.wz + RD;

    // Only test if player is roughly near this room
    if (nx < rx0 - P_RAD*2 || nx > rx1 + P_RAD*2 ||
        nz < rz0 - P_RAD*2 || nz > rz1 + P_RAD*2) continue;

    // North wall (z = sp.wz - RD), doorway opening x in [sp.wx-DW .. sp.wx+DW]
    // South wall (z = sp.wz + RD), same
    // West  wall (x = sp.wx - RW), doorway opening z in [sp.wz-DW .. sp.wz+DW]
    // East  wall (x = sp.wx + RW), same

    // Helper: does the player circle cross a Z-aligned wall plane at wz, between x [x0,x1],
    // with a doorway gap at [gapX0, gapX1]?
    const crossesZWall = (wz, x0, x1, gapX0, gapX1) => {
      // Player crosses the wall if their z-interval overlaps the wall z
      // and their x position is within the wall's x range
      const pz0 = nz - P_RAD, pz1 = nz + P_RAD;
      if (pz0 > wz || pz1 < wz) return false;        // doesn't reach wall
      if (nx + P_RAD < x0 || nx - P_RAD > x1) return false; // outside wall extent
      // In the doorway gap → passable (player circle must fit fully inside gap)
      if (nx > gapX0 + P_RAD && nx < gapX1 - P_RAD) return false;
      return true;
    };
    const crossesXWall = (wx, z0, z1, gapZ0, gapZ1) => {
      const px0 = nx - P_RAD, px1 = nx + P_RAD;
      if (px0 > wx || px1 < wx) return false;
      if (nz + P_RAD < z0 || nz - P_RAD > z1) return false;
      if (nz > gapZ0 + P_RAD && nz < gapZ1 - P_RAD) return false;
      return true;
    };

    const gx0 = sp.wx - DW, gx1 = sp.wx + DW;
    const gz0 = sp.wz - DW, gz1 = sp.wz + DW;

    if (crossesZWall(sp.wz - RD, rx0, rx1, gx0, gx1)) return true; // north
    if (crossesZWall(sp.wz + RD, rx0, rx1, gx0, gx1)) return true; // south
    if (crossesXWall(sp.wx - RW, rz0, rz1, gz0, gz1)) return true; // west
    if (crossesXWall(sp.wx + RW, rz0, rz1, gz0, gz1)) return true; // east
  }

  // ── Prop (pillar / wall segment) collision ───────────────────
  for (const sp of spaces.values()) {
    if (sp.type !== 'room') continue;
    const props = roomProps.get(roomKey(sp.rx, sp.rz));
    if (!props) continue;
    for (const p of props) {
      let hw, hd;
      if (p.type === 'pillar')      { hw = p.size / 2;      hd = p.size / 2; }
      else if (p.type === 'wallH')  { hw = p.len / 2;       hd = p.thickness / 2; }
      else                          { hw = p.thickness / 2; hd = p.len / 2; }
      const cx = sp.wx + p.px, cz = sp.wz + p.pz;
      if (nx + P_RAD > cx - hw && nx - P_RAD < cx + hw &&
          nz + P_RAD > cz - hd && nz - P_RAD < cz + hd) return true;
    }
  }

  // Hallway side walls
  for (const sp of spaces.values()) {
    if (sp.type !== 'hall') continue;
    const HL = CFG.HALL_LEN / 2;

    if (sp.axis === 'Z') {
      const zNear = sp.wz - HL, zFar = sp.wz + HL;
      const xL = sp.wx - DW, xR = sp.wx + DW;
      if (nz < zNear - P_RAD || nz > zFar + P_RAD) continue;
      // West wall x = xL
      if (Math.abs(nx - xL) < P_RAD && nz > zNear && nz < zFar) return true;
      // East wall x = xR
      if (Math.abs(nx - xR) < P_RAD && nz > zNear && nz < zFar) return true;
    } else {
      const xNear = sp.wx - HL, xFar = sp.wx + HL;
      const zN = sp.wz - DW, zS = sp.wz + DW;
      if (nx < xNear - P_RAD || nx > xFar + P_RAD) continue;
      // North wall z = zN
      if (Math.abs(nz - zN) < P_RAD && nx > xNear && nx < xFar) return true;
      // South wall z = zS
      if (Math.abs(nz - zS) < P_RAD && nx > xNear && nx < xFar) return true;
    }
  }

  return false;
}

function findCurrentSpace(nx, nz) {
  // Prefer halls (more specific) — if you're in a hall you're definitely traversing
  for (const [k,sp] of spaces) {
    if (sp.type!=='hall') continue;
    const HL=CFG.HALL_LEN/2;
    if (sp.axis==='Z') { if (Math.abs(nx-sp.wx)<DW && Math.abs(nz-sp.wz)<HL) return k; }
    else               { if (Math.abs(nx-sp.wx)<HL && Math.abs(nz-sp.wz)<DW) return k; }
  }
  for (const [k,sp] of spaces) {
    if (sp.type!=='room') continue;
    if (Math.abs(nx-sp.wx)<RW && Math.abs(nz-sp.wz)<RD) return k;
  }
  return currentSpaceKey;
}

// ─── UPDATE ────────────────────────────────────────────────────────────────
let lastTime=0;
function update(dt) {
  if (isMobile&&(touchLookDX||touchLookDY)) {
    player.yaw+=touchLookDX*0.008; player.pitch-=touchLookDY*0.008;
    touchLookDX=0; touchLookDY=0;
  } else {
    player.yaw+=mouseDX*CFG.MOUSE_SENS; player.pitch-=mouseDY*CFG.MOUSE_SENS;
    mouseDX=0; mouseDY=0;
  }
  player.pitch=Math.max(-1.4,Math.min(1.4,player.pitch));
  zoomFOV+=(zoomTarget-zoomFOV)*0.15;
  applyJoystickToKeys();

  if ((keys['Space']||keys['KeyF'])&&!player.isCrouching&&player.jumpsUsed<2) {
    player.velY=CFG.JUMP_VEL; player.jumpsUsed++; player.isJumping=true;
  }
  player.isCrouching=!!(keys['KeyC']||keys['ControlLeft']||keys['ControlRight']);

  player.velY-=CFG.GRAVITY*dt; player.wy+=player.velY*dt;
  const floorY=CFG.CAMERA_H+(player.isCrouching?-(CFG.CAMERA_H-CFG.CROUCH_H):0);
  if (player.wy<=floorY&&player.velY<=0) {
    const was=player.isJumping; player.wy=floorY; player.velY=0;
    player.isJumping=false; player.jumpsUsed=0; if(was) player.landThud=true;
  }
  if (player.wy>CY-CFG.CAMERA_H/2) { player.wy=CY-CFG.CAMERA_H/2; if(player.velY>0)player.velY=0; }

  player.isRunning=(keys['ShiftLeft']||keys['ShiftRight'])&&!player.isCrouching;
  let speed=player.isRunning?CFG.RUN_SPEED:CFG.WALK_SPEED;
  if (player.isCrouching) speed*=CFG.CROUCH_SPEED;
  const fX=Math.sin(player.yaw),fZ=Math.cos(player.yaw),rX=Math.cos(player.yaw),rZ=-Math.sin(player.yaw);
  let mx=0,mz=0; player.isMoving=false;
  if(keys['KeyW']||keys['ArrowUp'])   {mx+=fX*speed*dt;mz+=fZ*speed*dt;player.isMoving=true;}
  if(keys['KeyS']||keys['ArrowDown']) {mx-=fX*speed*dt;mz-=fZ*speed*dt;player.isMoving=true;}
  if(keys['KeyD']||keys['ArrowRight']){mx+=rX*speed*dt;mz+=rZ*speed*dt;player.isMoving=true;}
  if(keys['KeyA']||keys['ArrowLeft']) {mx-=rX*speed*dt;mz-=rZ*speed*dt;player.isMoving=true;}
  if(mx||mz) {
    if(!isBlocked(player.wx+mx, player.wz+mz))  { player.wx+=mx; player.wz+=mz; }
    else if(!isBlocked(player.wx+mx, player.wz)) { player.wx+=mx; }
    else if(!isBlocked(player.wx, player.wz+mz)) { player.wz+=mz; }
  }

  const newKey=findCurrentSpace(player.wx, player.wz);
  if (newKey!==currentSpaceKey) {
    currentSpaceKey=newKey;
    const sp=spaces.get(newKey);
    if (sp&&sp.type==='room') preloadAroundRoom(sp.rx, sp.rz);
  }

  // Smooth camera
  const bob=player.isMoving&&!player.isJumping;
  if(bob) player.bobTime+=dt*CFG.HEAD_BOB_SPEED;
  player.shakeTime+=dt;
  const bobY=bob?Math.sin(player.bobTime*2*Math.PI)*CFG.HEAD_BOB_AMT:0;
  const bobX=bob?Math.sin(player.bobTime*Math.PI)*CFG.HEAD_BOB_SWAY:0;
  const shkX=Math.sin(player.shakeTime*13.7)*0.08, shkY=Math.cos(player.shakeTime*11.3)*0.08;
  const crO=player.isCrouching?-(CFG.CAMERA_H-CFG.CROUCH_H):0;
  const sM=player.isMoving?0.25:1.0, sY=player.isCrouching||player.isJumping?0.35:sM;
  player.wxs+=(player.wx+bobX+shkX-player.wxs)*sM;
  player.wys+=(player.wy+crO+bobY+shkY-player.wys)*sY;
  player.wzs+=(player.wz-player.wzs)*sM;
  player.yaws+=(player.yaw-player.yaws)*0.3;
  player.pitchs+=(player.pitch-player.pitchs)*0.3;
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle=rgb(...CFG.BG_COL); ctx.fillRect(0,0,W,H);
  for (const k of getSpacesToRender()) {
    const sp=spaces.get(k); if(!sp) continue;
    if (sp.type==='room') emitRoom(sp); else emitHall(sp);
  }
  flush();
  const zT=Math.max(0,1-(zoomFOV-ZOOM_MIN)/(CFG.FOV_DEG-ZOOM_MIN));
  if (zT>0.01) {
    const g=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.8);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,`rgba(0,0,0,${(zT*0.75).toFixed(2)})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
}

// ─── AUDIO SYSTEM ──────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let reverbNode = null;
let footstepTimer = 0;
let audioReady = false;

function initAudio() {
  if (!audioReady) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(audioCtx.destination);

    // ── Convolution reverb ──────────────────────────────────────────────────
    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = makeReverbIR(audioCtx, 2.8, 0.18);
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.45;
    reverbNode.connect(reverbGain);
    reverbGain.connect(masterGain);

    audioReady = true;
  } else if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// ── Reverb impulse response (exponentially decaying noise) ─────────────────
function makeReverbIR(ctx, duration, decay) {
  const sr     = ctx.sampleRate;
  const length = sr * duration;
  const buf    = ctx.createBuffer(2, length, sr);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const t = i / sr;
      const env = Math.exp(-decay * t * 12);
      data[i] = (Math.random() * 2 - 1) * env;
      // Early reflections at ~15ms and ~30ms
      if (i === Math.floor(0.015 * sr) || i === Math.floor(0.030 * sr)) {
        data[i] += (Math.random() * 2 - 1) * 0.6;
      }
    }
  }
  return buf;
}

// ── Room acoustics — estimate openness from how many doorways are nearby ────
// In level 1 each room has 4 doorways (N/S/E/W), always open.
// We use the player's position within the room to approximate openness:
// deeper inside the room = more enclosed; near a doorway = more open.
let _openness = 0.5;
function updateRoomAcoustics() {
  if (!audioReady) return;
  const sp = spaces.get(currentSpaceKey);
  if (!sp) return;
  if (sp.type === 'hall') {
    // Hallways are narrow — feel quite enclosed
    _openness = 0.15;
  } else {
    // Room: measure proximity to each of the 4 doorway openings
    const dx = player.wx - sp.wx;
    const dz = player.wz - sp.wz;
    // Normalise position within room [-1..1]
    const nx = dx / RW, nz = dz / RD;
    // Openness rises toward the walls (where doorways are)
    const edge = Math.max(Math.abs(nx), Math.abs(nz));
    _openness = 0.25 + edge * 0.5;
  }
}

// ── Footstep (carpet thud + fabric noise) ──────────────────────────────────
function playFootstep(turnFactor) {
  if (!audioReady) return;
  const t   = audioCtx.currentTime;
  const dur = 0.16;
  const tf  = Math.max(0, Math.min(1, turnFactor || 0));

  const bufSize = audioCtx.sampleRate * dur;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  const noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = noiseBuf;

  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 280 - tf * 80;
  lpf.Q.value = 0.5;

  const bassOsc = audioCtx.createOscillator();
  bassOsc.type = 'sine';
  bassOsc.frequency.setValueAtTime(42, t);
  bassOsc.frequency.exponentialRampToValueAtTime(22, t + dur);
  const bassEnv = audioCtx.createGain();
  bassEnv.gain.setValueAtTime(0.18, t);
  bassEnv.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  const noiseEnv = audioCtx.createGain();
  const attack = 0.008;
  noiseEnv.gain.setValueAtTime(0, t);
  noiseEnv.gain.linearRampToValueAtTime(0.28, t + attack);
  noiseEnv.gain.linearRampToValueAtTime(0, t + dur);

  const stepGain = audioCtx.createGain();
  stepGain.gain.value = 0.38;

  noiseSource.connect(lpf);
  lpf.connect(noiseEnv);
  noiseEnv.connect(stepGain);
  bassOsc.connect(bassEnv);
  bassEnv.connect(stepGain);
  stepGain.connect(masterGain);

  const stepRevGain = audioCtx.createGain();
  stepRevGain.gain.value = 0.15 + _openness * 0.25;
  stepGain.connect(stepRevGain);
  stepRevGain.connect(reverbNode);

  noiseSource.start(t); noiseSource.stop(t + dur);
  bassOsc.start(t);     bassOsc.stop(t + dur);
}

// ── Landing thud (heavier impact when returning from jump) ─────────────────
function playLandThud() {
  if (!audioReady) return;
  const t   = audioCtx.currentTime;
  const dur = 0.22;

  const bufSize = audioCtx.sampleRate * dur;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  const noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = noiseBuf;

  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 220;
  lpf.Q.value = 0.7;

  const bassOsc = audioCtx.createOscillator();
  bassOsc.type = 'sine';
  bassOsc.frequency.setValueAtTime(55, t);
  bassOsc.frequency.exponentialRampToValueAtTime(18, t + dur);
  const bassEnv = audioCtx.createGain();
  bassEnv.gain.setValueAtTime(0.32, t);
  bassEnv.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  const noiseEnv = audioCtx.createGain();
  noiseEnv.gain.setValueAtTime(0, t);
  noiseEnv.gain.linearRampToValueAtTime(0.45, t + 0.01);
  noiseEnv.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  const stepGain = audioCtx.createGain();
  stepGain.gain.value = 0.6;

  noiseSource.connect(lpf);
  lpf.connect(noiseEnv);
  noiseEnv.connect(stepGain);
  bassOsc.connect(bassEnv);
  bassEnv.connect(stepGain);
  stepGain.connect(masterGain);

  const revGain = audioCtx.createGain();
  revGain.gain.value = 0.25 + _openness * 0.3;
  stepGain.connect(revGain);
  revGain.connect(reverbNode);

  noiseSource.start(t); noiseSource.stop(t + dur);
  bassOsc.start(t);     bassOsc.stop(t + dur);
}

// ── Footstep timing ────────────────────────────────────────────────────────
function updateFootsteps(dt) {
  if (player.landThud) {
    player.landThud = false;
    playLandThud();
    footstepTimer = 0;
    return;
  }
  if (!player.isMoving || player.isJumping) { footstepTimer = 0; return; }
  const interval = player.isRunning ? 0.32 : player.isCrouching ? 0.70 : 0.52;
  footstepTimer += dt;
  if (footstepTimer >= interval) {
    footstepTimer -= interval;
    playFootstep(Math.min(1, Math.abs(player.yaw - player.yaws) * 3));
  }
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
getOrCreateRoom(0,0);
generateRoomProps(0,0);
preloadAroundRoom(0,0);

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  if(mouseLocked){update(dt);updateFootsteps(dt);updateRoomAcoustics();}
  if(mouseLocked) render();
  requestAnimationFrame(loop);
}
if(!isMobile) document.getElementById('overlay-hint').textContent='CLICK TO ENTER';
setupMobileControls();
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
</script>
</body>
